---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Upgrade all packages
  apt:
    upgrade: dist
    autoremove: yes
    autoclean: yes
  register: upgrade_result

- name: Install base packages
  apt:
    name:
      - build-essential
      - git
      - curl
      - wget
      - vim
      - htop
      - net-tools
      - python3
      - python3-pip
      - python3-venv
      - sqlite3
      - jq
      - bc
      - netcat-openbsd
      - unattended-upgrades
      - apt-listchanges
    state: present

- name: Configure timezone
  command: timedatectl set-timezone {{ config.timezone }}
  changed_when: false

- name: Configure locale
  locale_gen:
    name: "{{ config.locale }}"
    state: present

- name: Set default locale
  lineinfile:
    path: /etc/default/locale
    regexp: '^LANG='
    line: 'LANG={{ config.locale }}'
    create: yes

- name: Apply sysctl optimizations
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
    sysctl_file: /etc/sysctl.d/99-voip-optimizations.conf
  loop:
    - { name: 'net.core.rmem_max', value: '16777216' }
    - { name: 'net.core.wmem_max', value: '16777216' }
    - { name: 'net.core.rmem_default', value: '262144' }
    - { name: 'net.core.wmem_default', value: '262144' }
    - { name: 'net.ipv4.tcp_rmem', value: '4096 87380 16777216' }
    - { name: 'net.ipv4.tcp_wmem', value: '4096 65536 16777216' }
    - { name: 'net.ipv4.tcp_congestion_control', value: 'bbr' }
    - { name: 'net.core.default_qdisc', value: 'fq' }
    - { name: 'net.ipv4.tcp_fastopen', value: '3' }
    - { name: 'net.ipv4.tcp_mtu_probing', value: '1' }
    - { name: 'vm.swappiness', value: '10' }
    - { name: 'vm.dirty_ratio', value: '15' }
    - { name: 'vm.dirty_background_ratio', value: '5' }
    - { name: 'fs.file-max', value: '65536' }

- name: Configure swap settings
  lineinfile:
    path: /etc/sysctl.d/99-voip-optimizations.conf
    regexp: '^vm.swappiness'
    line: 'vm.swappiness=10'
    create: yes

- name: Configure unattended-upgrades
  copy:
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    content: |
      Unattended-Upgrade::Allowed-Origins {
          "${distro_id}:${distro_codename}";
          "${distro_id}:${distro_codename}-security";
          "${distro_id}ESMApps:${distro_codename}-apps-security";
          "${distro_id}ESM:${distro_codename}-infra-security";
      };
      Unattended-Upgrade::AutoFixInterruptedDpkg "true";
      Unattended-Upgrade::MinimalSteps "true";
      Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "false";
    mode: '0644'

- name: Enable unattended-upgrades
  copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    mode: '0644'

- name: Create API group
  group:
    name: "{{ api_group }}"
    state: present

- name: Create API user
  user:
    name: "{{ api_user }}"
    group: "{{ api_group }}"
    system: yes
    shell: /bin/bash
    home: "{{ api_install_path }}"
    create_home: no
    comment: "VoIP API Service"

- name: Configure log rotation
  copy:
    dest: /etc/logrotate.d/voip-system
    content: |
      /var/log/voip/*.log {
          daily
          rotate 7
          compress
          delaycompress
          missingok
          notifempty
          create 0640 root adm
          sharedscripts
      }
    mode: '0644'

- name: Create log directory
  file:
    path: /var/log/voip
    state: directory
    mode: '0755'

# --- Restricted ops user (for AI agent ad-hoc commands) ---

- name: Create voip-ops user
  user:
    name: voip-ops
    shell: /bin/bash
    create_home: yes
    comment: "Restricted ops user for diagnostics"

- name: Authorize SSH key for voip-ops
  authorized_key:
    user: voip-ops
    key: "{{ lookup('file', config.pi_ssh_key + '.pub') }}"
    state: present

- name: Add /usr/sbin to voip-ops PATH
  lineinfile:
    path: /home/voip-ops/.bashrc
    line: 'export PATH="$PATH:/usr/sbin"'
    state: present

- name: Allow voip-ops limited sudo for systemctl and journalctl
  copy:
    dest: /etc/sudoers.d/voip-ops
    content: |
      voip-ops ALL=(root) NOPASSWD: /usr/bin/systemctl status *
      voip-ops ALL=(root) NOPASSWD: /usr/bin/systemctl restart voip-api
      voip-ops ALL=(root) NOPASSWD: /usr/bin/journalctl *
    mode: '0440'
    validate: 'visudo -cf %s'

- name: Check if reboot is required
  stat:
    path: /var/run/reboot-required
  register: reboot_required

- name: Display reboot message
  debug:
    msg: "System requires reboot. Please reboot manually when ready."
  when: reboot_required.stat.exists or upgrade_result.changed
