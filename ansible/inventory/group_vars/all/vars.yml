---
# Configuration is loaded in ansible/inventory/hosts.yml as the 'config' variable
# Secrets are loaded from vault.yml as 'vault_*' variables
#
# Use config.* and vault_* directly in ansible roles and playbooks
# Only define constants and computed values here

# Service Ports (constants)
http_port: 80
https_port: 8443
sip_tls_port: 5061
asterisk_ws_port: 8089
stun_port: 3478
turn_tls_port: 5349
rtp_port_start: 10000
rtp_port_end: 20000
api_port: 8000

# DNS Servers (constants)
pi_dns_servers:
  - "1.1.1.1"
  - "1.0.0.1"

# Service Users (constants)
asterisk_user: "asterisk"
asterisk_group: "asterisk"
api_user: "voipapi"
api_group: "voipapi"

# Database Configuration (constants + vault)
freepbx_db_name: "asterisk"
freepbx_db_user: "asteriskuser"
freevoice_db_name: "freevoice"
freevoice_db_user: "freevoice"
api_admin_username: "admin"

# Paths (constants)
install_base: "/opt"
api_install_path: "{{ install_base }}/voip-api"
client_install_path: "/var/www/voip-client"
asterisk_install_path: "/usr/local"

# LiveKit
livekit_version: "1.9.12"
livekit_port: 7880
livekit_rtc_tcp_port: 7881
livekit_rtc_port_start: 50000
livekit_rtc_port_end: 60000
livekit_install_path: "/opt/livekit"
livekit_user: "livekit"
livekit_group: "livekit"

# Dendrite
dendrite_version: "0.15.2"
dendrite_port: 8008
dendrite_install_path: "/opt/dendrite"
dendrite_user: "dendrite"
dendrite_group: "dendrite"

# Media retention
media_ttl_days: 30              # default retention period for all media
media_disk_budget_gb: 40        # usable media storage budget (GB)
media_cleanup_schedule: "daily" # systemd calendar: daily, weekly, or OnCalendar string

# Sygnal
# Push gateway (API-based, replaces Sygnal)
sygnal_url: "https://{{ config.duckdns_subdomain }}.duckdns.org:{{ https_port }}/api/push/notify"
sygnal_app_id: "org.freevoice.web"

# Go toolchain (used to build Dendrite; removed after build if installed by Ansible)
go_version: "1.22.3"

# Computed values (use in templates/tasks)
# Access as: {{ config.duckdns_subdomain }}.duckdns.org
# Access as: {{ vault_duckdns_token }}
# Access as: /etc/letsencrypt/live/{{ config.duckdns_subdomain }}.duckdns.org/fullchain.pem
