---
all:
  vars:
    # Load config.yml from project root
    config: "{{ lookup('file', inventory_dir + '/../../config.yml') | from_yaml }}"
    ansible_connection: ssh

  children:
    pi:
      hosts:
        raspberrypi:
          ansible_host: "{{ config.pi_static_ip }}"
          ansible_user: "{{ config.pi_username }}"
          ansible_python_interpreter: /usr/bin/python3
          ansible_ssh_private_key_file: "{{ config.pi_ssh_key }}"

    ops:
      hosts:
        pi-ops:
          ansible_host: "{{ config.pi_static_ip }}"
          ansible_user: voip-ops
          ansible_python_interpreter: /usr/bin/python3
          ansible_ssh_private_key_file: "{{ config.pi_ssh_key }}"
          ansible_become: false
